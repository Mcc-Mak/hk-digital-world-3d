            position: fixed;
            top: 10px;

            'B373302223701063A0', 'B373332276001063A0', 'B373332278201063A0', 'B373402244701063A0',
            'B373432236001063A0', 'B373432273001063A0', 'B373452247701063A0', 'B373592223301063A0',
            'B373612231401063A0', 'B373622247901063A0', 'B373632271801063A0', 'B373632275601063A0',
            'B373652271201063A0', 'B373682227301063A0', 'B373682246601063A0', 'B373702258501063A0',
            'B373842242201063A0', 'B373882247701063A0', 'B373962223002063A0', 'B373962226201063A0',
            'B374092267501063A0', 'B374142233701063A0', 'B374162252401063A0', 'B374352256201063A0',
            'B374782250901063A1', 'B374922241801063A0', 'B374942230601063A0', 'B374942235801063A0',
            'B374942247801063A0'
        ];
        
        const infrastructureFolders = [
            'I367402276207063A0', 'I367542276607063A0', 'I367722270007063A0', 'I368022216103063A0',
            'I369622261407063A0', 'I369642256307063A0', 'I370012227803063A0', 'I371202232703063A0',
            'I371612225103063A0', 'I371652259603063A1', 'I372042275602063A0', 'I372562226303063A0',
            'I372632224903063A0', 'I372902266003063A0', 'I373002266403063A0', 'I373122268403063A0',
            'I373272266403063A0', 'I373432226303063A0', 'I373432268903063A0', 'I373442257903063A1',
            'I373602229103063A0', 'I373792271703063A1', 'I374032228603063A0'
        ];
        
        const waterbodyFolders = [
            'W368192272607062A1', 'W368562273007062A1', 'W368782278903062A1', 'W369282250507062A1',
            'W369592244206062A1', 'W369652276806062A1', 'W370822254506062A1', 'W371062238903062A1',
            'W371092231407062A1', 'W371452238603062A1', 'W374122262603062A0', 'W374162270803062A1',
            'W374172270503062A1'
        ];
        
        // 構建模型清單
        const models = [
            ...buildingFolders.map(f => ({ name: f, type: 'BUILDING', path: `${BASE_PATH}/BUILDING/${f}/${f}.glb` })),
            ...infrastructureFolders.map(f => ({ name: f, type: 'INFRASTRUCTURE', path: `${BASE_PATH}/INFRASTRUCTURE/${f}/${f}.glb` })),
            ...waterbodyFolders.map(f => ({ name: f, type: 'WATERBODY', path: `${BASE_PATH}/WATERBODY/${f}/${f}.glb` }))
        ];
        
        // ========== 全域變數 ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x06080e);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 2, 50000);
        const renderer = new THREE.WebGLRenderer({ 
            antialias: false,
            powerPreference: "high-performance",
            precision: "mediump"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        
        // 場景配置
        scene.add(new THREE.AmbientLight(0xffffff, 1.4));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);
        scene.add(new THREE.AxesHelper(5000));
        
        const masterGroup = new THREE.Group();
        scene.add(masterGroup);
        
        const gridHelper = new THREE.GridHelper(30000, 60, 0x3366aa, 0x1a2233);
        scene.add(gridHelper);
        
        // Draco Loader 配置
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);
        
        // ========== 效能監控 ==========
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 60;
        let successCount = 0;
        let failedCount = 0;
        let gcCount = 0;
        let activeLoads = 0;
        let loadQueue = [...models];
        let isLoading = true;
        
        // 視錐體裁減相關
        const frustum = new THREE.Frustum();
        const projScreenMatrix = new THREE.Matrix4();
        let cullingEnabled = true;
        let lastCameraPosition = new THREE.Vector3();
        
        // 更新UI元素
        const statusSpan = document.getElementById('status');
        const positionSpan = document.getElementById('position-info');
        const debugSpan = document.getElementById('debug');
        const fpsSpan = document.getElementById('fps');
        const loadedCountSpan = document.getElementById('loaded-count');
        const totalCountSpan = document.getElementById('total-count');
        const gcCountSpan = document.getElementById('gc-count');
        
        totalCountSpan.textContent = models.length;
        
        // ========== 垃圾回收函數 (完整釋放資源) ==========
        function performManualGC(force = false) {
            let releasedMeshes = 0;
            let releasedMaterials = 0;
            let releasedGeometries = 0;
            
            // 遍歷所有模型，釋放不可見或標記為待清理的資源
            masterGroup.children.forEach(child => {
                if (!child.visible || force) {
                    child.traverse(obj => {
                        if (obj.isMesh) {
                            // 釋放幾何體
                            if (obj.geometry) {
                                obj.geometry.dispose();
                                releasedGeometries++;
                            }
                            // 釋放材質
                            if (obj.material) {
                                if (Array.isArray(obj.material)) {
                                    obj.material.forEach(mat => {
                                        if (mat) {
                                            mat.dispose();
                                            releasedMaterials++;
                                        }
                                    });
                                } else {
                                    obj.material.dispose();
                                    releasedMaterials++;
                                }
                            }
                            releasedMeshes++;
                        }
                    });
                    
                    // 只有在強制清理或距離過遠時才從場景移除
                    if (force && child.parent) {
                        masterGroup.remove(child);
                    }
                }
            });
            
            // 清空Three.js內部緩存
            THREE.Cache.clear();
            
            // 嘗試請求瀏覽器GC (僅在開發環境或標誌啟用時)
            if (window.gc) {
                window.gc();
            }
            
            gcCount++;
            gcCountSpan.textContent = gcCount;
            
            if (releasedMeshes > 0 || releasedMaterials > 0) {
                debugSpan.innerHTML = `🗑️ GC #${gcCount}: 釋放 ${releasedMeshes} 網格 | ${releasedMaterials} 材質 | ${releasedGeometries} 幾何體`;
                setTimeout(() => {
                    if (debugSpan.innerHTML.includes('GC')) {
                        debugSpan.innerHTML = `✅ 系統運行中 | 可見模型: ${masterGroup.children.filter(c => c.visible).length}`;
                    }
                }, 2000);
            }
            
            return { releasedMeshes, releasedMaterials, releasedGeometries };
        }
        
        // ========== 視錐體裁減更新 ==========
        function updateFrustumCulling() {
            if (!cullingEnabled) return;
            
            // 更新視錐體矩陣
            camera.updateMatrixWorld();
            camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
            projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
            frustum.setFromProjectionMatrix(projScreenMatrix);
            
            const cameraPos = camera.position;
            let visibleCount = 0;
            let culledCount = 0;
            
            masterGroup.children.forEach(model => {
                if (model.userData.center && model.userData.boundingSphere) {
                    // 距離裁減 (備用)
                    const distance = cameraPos.distanceTo(model.userData.center);
                    const withinDistance = distance < VISIBLE_DISTANCE;
                    
                    // 視錐體測試
                    const inFrustum = frustum.intersectsSphere(model.userData.boundingSphere);
                    const shouldBeVisible = withinDistance && inFrustum;
                    
                    if (model.visible !== shouldBeVisible) {
                        model.visible = shouldBeVisible;
                    }
                    
                    if (shouldBeVisible) visibleCount++;
                    else culledCount++;
                }
            });
            
            // 更新調試信息 (降低更新頻率)
            if (frameCount % 30 === 0) {
                debugSpan.innerHTML = `🎯 視錐體裁減 | 可見: ${visibleCount} | 隱藏: ${culledCount} | FPS: ${fps}`;
            }
        }
        
        // ========== 計算模型的包圍球 ==========
        function computeBoundingSphere(obj) {
            const box = new THREE.Box3().setFromObject(obj);
            const center = box.getCenter(new THREE.Vector3());
            const radius = box.getSize(new THREE.Vector3()).length() / 2;
            return new THREE.Sphere(center, Math.max(radius, 50));
        }
        
        // ========== 並行載入控制器 ==========
        function loadNextBatch() {
            if (!isLoading) return;
            if (activeLoads >= CONCURRENT_LOAD_LIMIT) return;
            if (loadQueue.length === 0) {
                if (activeLoads === 0) {
                    finishLoading();
                }
                return;
            }
            
            const model = loadQueue.shift();
            activeLoads++;
            
            loader.load(model.path, 
                (gltf) => {
                    const obj = gltf.scene;
                    
                    // 優化材質設定 (減少著色器開銷)
                    obj.traverse(child => {
                        if (child.isMesh) {
                            child.castShadow = false;
                            child.receiveShadow = false;
                            if (child.material) {
                                // 簡化材質屬性
                                child.material.roughness = 0.9;
                                child.material.metalness = 0.1;
                                if (child.material.map) {
                                    child.material.map.anisotropy = 1;
                                }
                            }
                        }
                    });
                    
                    // 計算包圍球和中心點 (用於裁減)
                    const boundingSphere = computeBoundingSphere(obj);
                    obj.userData.center = boundingSphere.center.clone();
                    obj.userData.boundingSphere = boundingSphere;
                    obj.userData.loaded = true;
                    
                    masterGroup.add(obj);
                    successCount++;
                    
                    // 定期執行GC
                    if (successCount % FORCE_GC_INTERVAL === 0) {
                        setTimeout(() => performManualGC(false), 100);
                    }
                    
                    // 更新UI
                    loadedCountSpan.textContent = successCount;
                    statusSpan.innerHTML = `📦 並行載入中 (${activeLoads} 線程) | ${successCount}/${models.length} (${Math.round((successCount/models.length)*100)}%)`;
                    
                    if (successCount === 1 || successCount % 50 === 0) {
                        updateCameraFocus();
                    }
                    
                    activeLoads--;
                    loadNextBatch();
                },
                (xhr) => {
                    // 可選: 顯示進度
                },
                (error) => {
                    console.warn(`⚠️ 載入失敗 [${model.name}]:`, error);
                    failedCount++;
                    activeLoads--;
                    loadNextBatch();
                }
            );
            
            // 繼續觸發更多載入
            if (activeLoads < CONCURRENT_LOAD_LIMIT && loadQueue.length > 0) {
                setTimeout(() => loadNextBatch(), 0);
            }
        }
        
        function finishLoading() {
            isLoading = false;
            statusSpan.innerHTML = `✅ Draco 引擎完成 | 成功: ${successCount} | 失敗: ${failedCount}`;
            
            // 最終清理
            setTimeout(() => {
                performManualGC(true);
                dracoLoader.dispose();
                debugSpan.innerHTML = `✨ 載入完成 | 總模型: ${successCount} | 記憶體已優化`;
            }, 500);
        }
        
        // ========== 相機自動對焦 ==========
        function updateCameraFocus() {
            if (masterGroup.children.length === 0) return;
            
            const box = new THREE.Box3().setFromObject(masterGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            if (gridHelper) {
                gridHelper.position.set(center.x, box.min.y - 10, center.z);
            }
            
            const maxDimension = Math.max(size.x, size.z, 500);
            const fovRad = camera.fov * Math.PI / 180;
            let optimalDistance = maxDimension / (2 * Math.tan(fovRad / 2)) * 1.2;
            optimalDistance = Math.min(Math.max(optimalDistance, 800), 8000);
            
            // 只在初始或完成時調整相機
            if (successCount <= 10 || successCount === models.length) {
                camera.position.set(center.x + optimalDistance * 0.6, center.y + optimalDistance * 0.4, center.z + optimalDistance * 0.6);
                controls.target.copy(center);
                controls.update();
            }
            
            positionSpan.innerHTML = `📍 範圍: X:${center.x.toFixed(0)} Z:${center.z.toFixed(0)} | 範圍:${Math.round(maxDimension)}m`;
        }
        
        // ========== FPS 計算 ==========
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            const delta = now - lastTime;
            if (delta >= 1000) {
                fps = Math.round((frameCount * 1000) / delta);
                fpsSpan.textContent = fps;
                frameCount = 0;
                lastTime = now;
            }
        }
        
        // ========== 動畫循環 ==========
        let frameIndex = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update(); // 只有當controls被更新時才需要
            updateFPS();
            
            // 定期更新視錐體裁減
            frameIndex++;
            if (frameIndex % FRUSTUM_CULLING_INTERVAL === 0 && !isLoading) {
                updateFrustumCulling();
            }
            
            renderer.render(scene, camera);
        }
        
        // ========== 手動GC按鈕 ==========
        document.getElementById('manual-gc-btn').addEventListener('click', () => {
            const result = performManualGC(true);
            debugSpan.innerHTML = `🧹 手動GC: 釋放 ${result.releasedMeshes} 網格, ${result.releasedMaterials} 材質`;
            setTimeout(() => {
                if (debugSpan.innerHTML.includes('手動GC')) {
                    debugSpan.innerHTML = `✅ GC 完成 | 當前可見: ${masterGroup.children.filter(c => c.visible).length}`;
                }
            }, 1500);
        });
        
        // ========== 窗口大小適配 ==========
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ========== 啟動引擎 ==========
        function start() {
            statusSpan.innerHTML = `🚀 啟動並行引擎 (並行數: ${CONCURRENT_LOAD_LIMIT})...`;
            camera.position.set(3000, 2000, 4000);
            controls.target.set(0, 0, 0);
            controls.update();
            
            // 開始並行載入
            for (let i = 0; i < CONCURRENT_LOAD_LIMIT; i++) {
                loadNextBatch();
            }
            
            animate();
        }
        
        start();
        
        // 定期自動GC (每60秒)
        setInterval(() => {
            if (!isLoading) {
                performManualGC(false);
            }
        }, 60000);
        
        console.log('✅ HK Digital Twin 優化版已啟動 | 並行載入:', CONCURRENT_LOAD_LIMIT, '| GC間隔:', FORCE_GC_INTERVAL);
    </script>
</body>
</html>
