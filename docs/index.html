            'W368192272607062A1', 'W368562273007062A1', 'W368782278903062A1', 'W369282250507062A1',
            'W369592244206062A1', 'W369652276806062A1', 'W370822254506062A1', 'W371062238903062A1',
            'W371092231407062A1', 'W371452238603062A1', 'W374122262603062A0', 'W374162270803062A1',
            'W374172270503062A1'
        ];
        
        // Maps paths dynamically to point to the newly compiled single .glb binary extension
        const models = [
            ...buildingFolders.map(f => ({ name: f, type: 'BUILDING', path: `${BASE_PATH}/BUILDING/${f}/${f}.glb` })),
            ...infrastructureFolders.map(f => ({ name: f, type: 'INFRASTRUCTURE', path: `${BASE_PATH}/INFRASTRUCTURE/${f}/${f}.glb` })),
            ...waterbodyFolders.map(f => ({ name: f, type: 'WATERBODY', path: `${BASE_PATH}/WATERBODY/${f}/${f}.glb` }))
        ];
        
        // STAGE DESIGN & RENDER CONFIGURATION
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x06080e);
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 5, 5000000);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: false,
            powerPreference: "high-performance",
            precision: "lowp"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(0.4);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        
        scene.add(new THREE.AmbientLight(0xffffff, 1.6));

        const masterGroup = new THREE.Group();
        scene.add(masterGroup);
        
        const grid = new THREE.GridHelper(30000, 40, 0x223355, 0x10141e);
        scene.add(grid);
        
        // WIRE UP THE DRACO DECODER INFRASTRUCTURE
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        
        // Directs Three.js to pull multi-threaded WebAssembly decompression routines from Google's secure cdn on the fly
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);

        let successCount = 0;
        const statusSpan = document.getElementById('status');
        const positionSpan = document.getElementById('position-info');
        const debugSpan = document.getElementById('debug');
        
        statusSpan.innerHTML = `Streaming pipeline active for ${models.length} binary chunks...`;

        // SEQUENTIAL ASSET ACQUISITION LOOP
        function loadModelAtIndex(index) {
            if (index >= models.length) return;

            const model = models[index];
            loader.load(model.path, 
                (gltf) => {
                    const obj = gltf.scene;
                    const box = new THREE.Box3().setFromObject(obj);
                    obj.userData.center = box.getCenter(new THREE.Vector3());
                    
                    obj.traverse(child => {
                        if (child.isMesh) {
                            child.castShadow = false;
                            child.receiveShadow = false;
                            child.matrixAutoUpdate = false;
                            child.updateMatrix();
                            
                            if (child.material) {
                                child.material.roughness = 1.0;
                                child.material.metalness = 0.0;
                                // Runtime canvas texture downsampling can be safely omitted here
                                // since Draco directly compresses asset bit-depth inside memory layout arrays.
                            }
                        }
                    });
                    
                    masterGroup.add(obj);
                    successCount++;
                    
                    if (successCount % 10 === 0) {
                        THREE.Cache.clear();
                    }

                    if (successCount === 1 || successCount % 40 === 0 || successCount === models.length) {
                        updateCameraFocus();
                    }

                    statusSpan.innerHTML = `Ingested ${successCount}/${models.length} chunks (${Math.round((successCount/models.length)*100)}%)`;
                    
                    if (successCount === models.length) {
                        statusSpan.innerHTML = `✅ Draco Twin Engine online. All blocks structural.`;
                    }

                    setTimeout(() => { loadModelAtIndex(index + 1); }, 1);
                },
                undefined,
                (error) => {
                    console.error(`Skipped chunk target [${model.name}]:`, error);
                    successCount++;
                    loadModelAtIndex(index + 1);
                }
            );
        }

        loadModelAtIndex(0);
        
        function updateCameraFocus() {
            const box = new THREE.Box3().setFromObject(masterGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            grid.position.set(center.x, box.min.y, center.z);
            
            const maxDimension = Math.max(size.x, size.z);
            const fovRad = camera.fov * (Math.PI / 180);
            let optimalDistance = Math.abs(maxDimension / 2 / Math.tan(fovRad / 2)) * 1.3;
            
            if (isNaN(optimalDistance) || optimalDistance === 0) optimalDistance = 5000;
            
            if (camera.position.length() === 0 || successCount <= 30 || successCount === models.length) {
                camera.position.set(center.x + (optimalDistance * 0.5), box.max.y + (optimalDistance * 0.5), center.z + (optimalDistance * 0.5));
                controls.target.copy(center);
            }
            
            controls.update();
            positionSpan.innerHTML = `Global Map Focus: East [${center.x.toFixed(0)}] | North [${center.z.toFixed(0)}]`;
        }
        
        // OCULSION & HORIZON CULLING SUB-SYSTEM
        let frameTicks = 0;
        const visibleRange = 30000; 

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            frameTicks++;
            if (frameTicks % 20 === 0 && masterGroup.children.length > 0) {
                const cameraPos = camera.position;
                let activeCount = 0;
                let hiddenCount = 0;
                
                masterGroup.children.forEach(model => {
                    if (model.userData.center) {
                        const distance = cameraPos.distanceTo(model.userData.center);
                        if (distance > visibleRange) {
                            if (model.visible !== false) model.visible = false;
                            hiddenCount++;
                        } else {
                            if (model.visible !== true) model.visible = true;
                            activeCount++;
                        }
                    }
                });
                debugSpan.innerHTML = `VRAM Dynamic Culling: Active Chunks: ${activeCount} | Culled: ${hiddenCount}`;
            }
            
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
