<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HK Digital Twin - 即時距離卸載版 | 記憶體安全</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; background-color: #06080e; }
        #info {
            position: fixed; top: 10px; left: 10px;
            background: rgba(0,0,0,0.9); color: #00ffaa; padding: 12px; border-radius: 5px;
            font-size: 11px; z-index: 1000; pointer-events: none; max-width: 420px;
            border-left: 3px solid #00ffaa; backdrop-filter: blur(4px);
        }
        .controls {
            position: fixed; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: white; padding: 5px 10px;
            border-radius: 5px; font-size: 10px; z-index: 1000; font-family: monospace;
        }
        .debug {
            position: fixed; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.85); color: #ffaa44; padding: 8px 12px;
            border-radius: 5px; font-size: 10px; z-index: 1000; font-family: monospace;
            pointer-events: none; backdrop-filter: blur(4px);
        }
        .stats-panel {
            position: fixed; top: 10px; right: 10px;
            background: rgba(0,0,0,0.8); color: #88ffaa; padding: 8px 12px;
            border-radius: 5px; font-size: 10px; z-index: 1000; font-family: monospace;
            text-align: right; pointer-events: none; backdrop-filter: blur(4px);
        }
        button {
            position: fixed; bottom: 10px; right: 120px;
            background: rgba(0,0,0,0.7); color: #ffaa44; border: 1px solid #ffaa44;
            padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer;
            z-index: 1001; font-family: monospace;
        }
        button:hover { background: #ffaa44; color: #000; }
    </style>
</head>
<body>
    <div id="info">
        🏙️ HK DIGITAL TWIN | 即時距離卸載<br>
        <span id="status">初始化 Draco 引擎...</span><br>
        <span id="position-info">定位中...</span>
    </div>
    <div class="stats-panel" id="stats-panel">
        📊 效能監控<br>
        FPS: <span id="fps">--</span><br>
        🧩 記憶體中: <span id="mem-count">0</span> 模型<br>
        🗑️ 已卸載: <span id="gc-count">0</span><br>
        ⏳ 佇列中: <span id="queue-count">0</span>
    </div>
    <div class="controls">
        🖱️ 左鍵旋轉 | 右鍵平移 | 滾輪縮放
    </div>
    <div class="debug" id="debug">
        ⚙️ 等待引擎啟動...
    </div>
    <button id="manual-gc-btn">🗑️ 強制清理遠景</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"

        }

            'B372042265201063A0','B372112234601063A0','B372112242701063A0','B372122248001063A0',
            'B372142253801063A0','B372152221601063A0','B372162224901063A0','B372372279001063A0',

            'B372562231801063A0','B372582242301063A0','B372762277301063A0','B372832223701063A0',
            'B372832236201063A0','B372832243401063A0','B372852247701063A0','B372852254401063A0',
            'B372912244201063A0','B372932242301063A0','B372952270301063A0','B372982245301063A0',
            'B373032263901063A0','B373092252101063A0','B373122242301063A0','B373132271001063A0',
            'B373302223701063A0','B373332276001063A0','B373332278201063A0','B373402244701063A0',
            'B373432236001063A0','B373432273001063A0','B373452247701063A0','B373592223301063A0',
            'B373612231401063A0','B373622247901063A0','B373632271801063A0','B373632275601063A0',
            'B373652271201063A0','B373682227301063A0','B373682246601063A0','B373702258501063A0',
            'B373842242201063A0','B373882247701063A0','B373962223002063A0','B373962226201063A0',
            'B374092267501063A0','B374142233701063A0','B374162252401063A0','B374352256201063A0',
            'B374782250901063A1','B374922241801063A0','B374942230601063A0','B374942235801063A0',
            'B374942247801063A0'
        ];
        const infrastructureFolders = [
            'I367402276207063A0','I367542276607063A0','I367722270007063A0','I368022216103063A0',
            'I369622261407063A0','I369642256307063A0','I370012227803063A0','I371202232703063A0',
            'I371612225103063A0','I371652259603063A1','I372042275602063A0','I372562226303063A0',
            'I372632224903063A0','I372902266003063A0','I373002266403063A0','I373122268403063A0',
            'I373272266403063A0','I373432226303063A0','I373432268903063A0','I373442257903063A1',
            'I373602229103063A0','I373792271703063A1','I374032228603063A0'
        ];
        const waterbodyFolders = [
            'W368192272607062A1','W368562273007062A1','W368782278903062A1','W369282250507062A1',
            'W369592244206062A1','W369652276806062A1','W370822254506062A1','W371062238903062A1',
            'W371092231407062A1','W371452238603062A1','W374122262603062A0','W374162270803062A1',
            'W374172270503062A1'
        ];
        
        const models = [
            ...buildingFolders.map(f => ({ name: f, type: 'BUILDING', path: `${BASE_PATH}/BUILDING/${f}/${f}.glb` })),
            ...infrastructureFolders.map(f => ({ name: f, type: 'INFRASTRUCTURE', path: `${BASE_PATH}/INFRASTRUCTURE/${f}/${f}.glb` })),
            ...waterbodyFolders.map(f => ({ name: f, type: 'WATERBODY', path: `${BASE_PATH}/WATERBODY/${f}/${f}.glb` }))
        ];
        
        // ========== Three.js 初始化 ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x06080e);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 2, 50000);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance", precision: "mediump" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.0; controls.zoomSpeed = 1.2; controls.panSpeed = 0.8;
        
        scene.add(new THREE.AmbientLight(0xffffff, 1.4));
        const dLight = new THREE.DirectionalLight(0xffffff, 0.8); dLight.position.set(1, 2, 1); scene.add(dLight);
        scene.add(new THREE.AxesHelper(5000));
        
        const masterGroup = new THREE.Group(); scene.add(masterGroup);
        const gridHelper = new THREE.GridHelper(30000, 60, 0x3366aa, 0x1a2233); scene.add(gridHelper);
        
        // Draco
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);
        
        // ========== 全域狀態 ==========
        let frameCount = 0, lastTime = performance.now(), fps = 60;
        let successCount = 0, failedCount = 0, unloadCount = 0;
        let activeLoads = 0;
        let loadQueue = [...models];
        const loadedModels = new Map(); // name -> group
        
        // UI
        const statusSpan = document.getElementById('status');
        const positionSpan = document.getElementById('position-info');
        const debugSpan = document.getElementById('debug');
        const fpsSpan = document.getElementById('fps');
        const memCountSpan = document.getElementById('mem-count');
        const gcCountSpan = document.getElementById('gc-count');
        const queueCountSpan = document.getElementById('queue-count');
        queueCountSpan.textContent = models.length;
        
        // ========== 卸載 ==========
        function unloadModel(model) {
            if (!model || !model.parent) return;
            model.traverse(child => {
                if (child.isMesh) {
                    child.geometry?.dispose();
                    if (child.material) {
                        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                        else child.material.dispose();
                    }
                }
            });
            model.parent.remove(model);
            const name = model.userData.name;
            if (name && loadedModels.has(name)) loadedModels.delete(name);
        }
        
        // 安全卸載最遠的模型 (僅在記憶體異常時使用)
        function unloadFarthestModel() {
            let farthestDist = -1, farthestModel = null;
            const camPos = camera.position;
            loadedModels.forEach(group => {
                const c = group.userData.center;
                if (!c) return;
                const d = camPos.distanceTo(c);
                if (d > farthestDist) { farthestDist = d; farthestModel = group; }
            });
            if (farthestModel) {
                unloadModel(farthestModel);
                unloadCount++;
                gcCountSpan.textContent = unloadCount;
                return true;
            }
            return false;
        }
        
        // ========== 載入回調 ==========
        function onModelLoaded(model, gltf) {
            const obj = gltf.scene;
            // 材質優化
            obj.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = false; child.receiveShadow = false;
                    if (child.material) {
                        child.material.roughness = 0.9; child.material.metalness = 0.1;
                        if (child.material.map) child.material.map.anisotropy = 1;
                    }
                }
            });
            // 計算包圍球
            const box = new THREE.Box3().setFromObject(obj);
            const center = box.getCenter(new THREE.Vector3());
            const radius = box.getSize(new THREE.Vector3()).length() / 2;
            const sphere = new THREE.Sphere(center, Math.max(radius, 50));
            obj.userData.center = center.clone();
            obj.userData.boundingSphere = sphere;
            obj.userData.name = model.name;
            
            // 添加到場景
            masterGroup.add(obj);
            loadedModels.set(model.name, obj);
            successCount++;
            
            // ★★★ 關鍵：立即檢查距離，如果太遠就卸載 (記憶體即時釋放)
            const camPos = camera.position;
            if (center.distanceTo(camPos) > UNLOAD_DISTANCE) {
                unloadModel(obj);
                unloadCount++;
                gcCountSpan.textContent = unloadCount;
            }
            
            // 額外安全機制：如果記憶體中模型數異常高，強制卸載最遠的
            if (loadedModels.size > MAX_LOADED_MODELS_SAFETY) {
                unloadFarthestModel();
            }
            
            memCountSpan.textContent = loadedModels.size;
            statusSpan.innerHTML = `📦 載入中 | 成功 ${successCount}/${models.length} (${Math.round(successCount/models.length*100)}%)`;
            
            if (successCount === 1 || successCount % 50 === 0) updateCameraFocus();
            
            activeLoads--;
            // 繼續載入下一個
            if (loadQueue.length > 0 && activeLoads < CONCURRENT_LOAD_LIMIT) {
                loadNextBatch();
            }
            // 如果佇列已空，檢查是否全部完成
            if (loadQueue.length === 0 && activeLoads === 0) finishLoading();
        }
        
        function onModelError(model, error) {
            console.warn(`⚠️ 載入失敗 [${model.name}]:`, error);
            failedCount++;
            activeLoads--;
            queueCountSpan.textContent = loadQueue.length;
            if (loadQueue.length > 0 && activeLoads < CONCURRENT_LOAD_LIMIT) loadNextBatch();
        }
        
        function loadNextBatch() {
            if (activeLoads >= CONCURRENT_LOAD_LIMIT) return;
            if (loadQueue.length === 0) return;
            const model = loadQueue.shift();
            activeLoads++;
            queueCountSpan.textContent = loadQueue.length;
            loader.load(model.path,
                (gltf) => onModelLoaded(model, gltf),
                undefined,
                (err) => onModelError(model, err)
            );
            // 嘗試啟動更多並行載入
            if (activeLoads < CONCURRENT_LOAD_LIMIT && loadQueue.length > 0) {
                setTimeout(() => loadNextBatch(), 0);
            }
        }
        
        function finishLoading() {
            statusSpan.innerHTML = `✅ 載入完成 | 成功 ${successCount} | 失敗 ${failedCount}`;
            dracoLoader.dispose();
            debugSpan.innerHTML = `✨ 完成 | 記憶體中保留 ${loadedModels.size} 個模型`;
        }
        
        function updateCameraFocus() {
            if (masterGroup.children.length === 0) return;
            const box = new THREE.Box3().setFromObject(masterGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            if (gridHelper) gridHelper.position.set(center.x, box.min.y - 10, center.z);
            const maxDim = Math.max(size.x, size.z, 500);
            const fovRad = camera.fov * Math.PI / 180;
            let dist = maxDim / (2 * Math.tan(fovRad / 2)) * 1.2;
            dist = Math.min(Math.max(dist, 800), 8000);
            if (successCount <= 10 || successCount === models.length) {
                camera.position.set(center.x + dist*0.6, center.y + dist*0.4, center.z + dist*0.6);
                controls.target.copy(center);
                controls.update();
            }
            positionSpan.innerHTML = `📍 範圍: X:${center.x.toFixed(0)} Z:${center.z.toFixed(0)} | 跨度:${Math.round(maxDim)}m`;
        }
        
        // ========== FPS ==========
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                fps = Math.round((frameCount * 1000) / (now - lastTime));
                fpsSpan.textContent = fps;
                frameCount = 0; lastTime = now;
            }
        }
        
        // ========== 視錐剔除 ==========
        const frustum = new THREE.Frustum();
        const projScreenMatrix = new THREE.Matrix4();
        function updateFrustumCulling() {
            camera.updateMatrixWorld();
            camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
            projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
            frustum.setFromProjectionMatrix(projScreenMatrix);
            const camPos = camera.position;
            let visible = 0, culled = 0;
            loadedModels.forEach(group => {
                const c = group.userData.center, s = group.userData.boundingSphere;
                if (!c || !s) return;
                const inDist = camPos.distanceTo(c) < VISIBLE_DISTANCE;
                const inFrustum = frustum.intersectsSphere(s);
                group.visible = inDist && inFrustum;
                if (group.visible) visible++; else culled++;
            });
            if (frameCount % 30 === 0) {
                debugSpan.innerHTML = `🎯 視錐: 可見${visible} 隱藏${culled} | 記憶體: ${loadedModels.size}`;
            }
        }
        
        // ========== 動畫循環 ==========
        let frameIndex = 0;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateFPS();
            if (frameIndex % FRUSTUM_CULLING_INTERVAL === 0) updateFrustumCulling();
            if (frameIndex % STREAMING_CHECK_INTERVAL === 0) {
                // 週期性清理遠景 (處理相機移動後超出距離的模型)
                const camPos = camera.position;
                const toUnload = [];
                loadedModels.forEach(group => {
                    const c = group.userData.center;
                    if (c && camPos.distanceTo(c) > UNLOAD_DISTANCE) toUnload.push(group);
                });
                toUnload.forEach(m => { unloadModel(m); unloadCount++; });
                if (toUnload.length > 0) gcCountSpan.textContent = unloadCount;
                memCountSpan.textContent = loadedModels.size;
            }
            renderer.render(scene, camera);
            frameIndex++;
        }
        
        // ========== 手動GC ==========
        document.getElementById('manual-gc-btn').addEventListener('click', () => {
            const camPos = camera.position;
            let removed = 0;
            const all = Array.from(loadedModels.values());
            all.forEach(group => {
                const c = group.userData.center;
                if (c && camPos.distanceTo(c) > UNLOAD_DISTANCE) {
                    unloadModel(group);
                    removed++;
                }
            });
            unloadCount += removed;
            gcCountSpan.textContent = unloadCount;
            debugSpan.innerHTML = `🧹 手動清理 ${removed} 個遠景 | 保留 ${loadedModels.size}`;
            if (window.gc) window.gc();
        });
        
        // ========== 啟動 ==========
        function start() {
            statusSpan.innerHTML = `🚀 即時卸載模式 | 距離閾值: ${UNLOAD_DISTANCE}m`;
            camera.position.set(3000, 2000, 4000);
            controls.target.set(0,0,0);
            controls.update();
            for (let i = 0; i < CONCURRENT_LOAD_LIMIT; i++) loadNextBatch();
            animate();
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        start();
        console.log('✅ 即時距離卸載版已啟動');
    </script>
</body>
