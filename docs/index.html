            'B373302223701063A0', 'B373332276001063A0', 'B373332278201063A0', 'B373402244701063A0',
            'B373432236001063A0', 'B373432273001063A0', 'B373452247701063A0', 'B373592223301063A0',
            'B373612231401063A0', 'B373622247901063A0', 'B373632271801063A0', 'B373632275601063A0',
            'B373652271201063A0', 'B373682227301063A0', 'B373682246601063A0', 'B373702258501063A0',
            'B373842242201063A0', 'B373882247701063A0', 'B373962223002063A0', 'B373962226201063A0',
            'B374092267501063A0', 'B374142233701063A0', 'B374162252401063A0', 'B374352256201063A0',
            'B374782250901063A1', 'B374922241801063A0', 'B374942230601063A0', 'B374942235801063A0',
            'B374942247801063A0'
        ];
        
        const infrastructureFolders = [
            'I367402276207063A0', 'I367542276607063A0', 'I367722270007063A0', 'I368022216103063A0',
            'I369622261407063A0', 'I369642256307063A0', 'I370012227803063A0', 'I371202232703063A0',
            'I371612225103063A0', 'I371652259603063A1', 'I372042275602063A0', 'I372562226303063A0',
            'I372632224903063A0', 'I372902266003063A0', 'I373002266403063A0', 'I373122268403063A0',
            'I373272266403063A0', 'I373432226303063A0', 'I373432268903063A0', 'I373442257903063A1',
            'I373602229103063A0', 'I373792271703063A1', 'I374032228603063A0'
        ];
        
        const waterbodyFolders = [
            'W368192272607062A1', 'W368562273007062A1', 'W368782278903062A1', 'W369282250507062A1',
            'W369592244206062A1', 'W369652276806062A1', 'W370822254506062A1', 'W371062238903062A1',
            'W371092231407062A1', 'W371452238603062A1', 'W374122262603062A0', 'W374162270803062A1',
            'W374172270503062A1'
        ];
        
        // 構建模型清單
        const models = [
            ...buildingFolders.map(f => ({ name: f, type: 'BUILDING', path: `${BASE_PATH}/BUILDING/${f}/${f}.glb` })),
            ...infrastructureFolders.map(f => ({ name: f, type: 'INFRASTRUCTURE', path: `${BASE_PATH}/INFRASTRUCTURE/${f}/${f}.glb` })),
            ...waterbodyFolders.map(f => ({ name: f, type: 'WATERBODY', path: `${BASE_PATH}/WATERBODY/${f}/${f}.glb` }))
        ];
        
        // ========== 全域變數 ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x06080e);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 2, 50000);
        const renderer = new THREE.WebGLRenderer({ 
            antialias: false,
            powerPreference: "high-performance",
            precision: "mediump"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        
        // 場景配置
        scene.add(new THREE.AmbientLight(0xffffff, 1.4));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 2, 1);
        scene.add(directionalLight);
        scene.add(new THREE.AxesHelper(5000));
        
        const masterGroup = new THREE.Group();
        scene.add(masterGroup);
        
        const gridHelper = new THREE.GridHelper(30000, 60, 0x3366aa, 0x1a2233);
        scene.add(gridHelper);
        
        // Draco Loader 配置
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);
        
        // ========== 效能監控 ==========
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 60;
        let successCount = 0;
        let failedCount = 0;
        let unloadCount = 0;  // 卸載次數計數
        let activeLoads = 0;
        let loadQueue = [...models];
        let isLoading = true;
        
        // 視錐體裁減相關
        const frustum = new THREE.Frustum();
        const projScreenMatrix = new THREE.Matrix4();
        let cullingEnabled = true;
        
        // 維護已載入模型 Map (name -> group)
        const loadedModels = new Map();
        
        // 更新UI元素
        const statusSpan = document.getElementById('status');
        const positionSpan = document.getElementById('position-info');
        const debugSpan = document.getElementById('debug');
        const fpsSpan = document.getElementById('fps');
        const memCountSpan = document.getElementById('mem-count');
        const gcCountSpan = document.getElementById('gc-count');
        
        // ========== 卸載單個模型 (完整清理) ==========
        function unloadModel(model) {
            if (!model || !model.parent) return;
            
            model.traverse(child => {
                if (child.isMesh) {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(m => m.dispose());
                        } else {
                            child.material.dispose();
                        }
                    }
                }
            });
            
            model.parent.remove(model);
            
            // 從已載入列表中移除
            const name = model.userData.name;
            if (name && loadedModels.has(name)) {
                loadedModels.delete(name);
            }
        }
        
        // ========== 根據距離卸載遠處模型 ==========
        function updateDistanceUnloading() {
            if (isLoading) return; // 載入過程中不卸載
            
            const camPos = camera.position;
            const toUnload = [];
            
            loadedModels.forEach((group, name) => {
                const center = group.userData.center;
                if (!center) return;
                
                const dist = camPos.distanceTo(center);
                if (dist > UNLOAD_DISTANCE) {
                    toUnload.push(group);
                }
            });
            
            if (toUnload.length > 0) {
                toUnload.forEach(model => {
                    unloadModel(model);
                    unloadCount++;
                });
                gcCountSpan.textContent = unloadCount;
                debugSpan.innerHTML = `🗑️ 自動卸載 ${toUnload.length} 個遠景模型 | 當前保留: ${loadedModels.size} 個`;
            }
            
            memCountSpan.textContent = loadedModels.size;
        }
        
        // ========== 手動強制清理所有遠景 (保留近景) ==========
        function performManualGC() {
            if (isLoading) return;
            
            const camPos = camera.position;
            let released = 0;
            
            // 複製一份以避免迭代時修改
            const allLoaded = Array.from(loadedModels.values());
            allLoaded.forEach(group => {
                const center = group.userData.center;
                if (!center) return;
                
                if (camPos.distanceTo(center) > UNLOAD_DISTANCE) {
                    unloadModel(group);
                    released++;
                }
            });
            
            unloadCount += released;
            gcCountSpan.textContent = unloadCount;
            debugSpan.innerHTML = `🧹 手動清理完成: 卸載 ${released} 個模型 | 保留: ${loadedModels.size} 個`;
            
            // 主動觸發 GC (如果可用)
            if (window.gc) {
                window.gc();
            }
        }
        
        // ========== 視錐體裁減更新 ==========
        function updateFrustumCulling() {
            if (!cullingEnabled) return;
            
            camera.updateMatrixWorld();
            camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
            projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
            frustum.setFromProjectionMatrix(projScreenMatrix);
            
            const cameraPos = camera.position;
            let visibleCount = 0;
            let culledCount = 0;
            
            // 只對已載入的模型進行視錐剔除
            loadedModels.forEach(group => {
                const center = group.userData.center;
                const sphere = group.userData.boundingSphere;
                if (!center || !sphere) return;
                
                const distance = cameraPos.distanceTo(center);
                const withinDistance = distance < VISIBLE_DISTANCE;
                const inFrustum = frustum.intersectsSphere(sphere);
                const shouldBeVisible = withinDistance && inFrustum;
                
                if (group.visible !== shouldBeVisible) {
                    group.visible = shouldBeVisible;
                }
                
                if (shouldBeVisible) visibleCount++;
                else culledCount++;
            });
            
            if (frameCount % 30 === 0) {
                debugSpan.innerHTML = `🎯 視錐體 | 可見: ${visibleCount} | 隱藏: ${culledCount} | 記憶體: ${loadedModels.size} 個`;
            }
        }
        
        // ========== 計算模型的包圍球 ==========
        function computeBoundingSphere(obj) {
            const box = new THREE.Box3().setFromObject(obj);
            const center = box.getCenter(new THREE.Vector3());
            const radius = box.getSize(new THREE.Vector3()).length() / 2;
            return new THREE.Sphere(center, Math.max(radius, 50));
        }
        
        // ========== 並行載入控制器 ==========
        function loadNextBatch() {
            if (!isLoading) return;
            if (activeLoads >= CONCURRENT_LOAD_LIMIT) return;
            if (loadQueue.length === 0) {
                if (activeLoads === 0) {
                    finishLoading();
                }
                return;
            }
            
            const model = loadQueue.shift();
            activeLoads++;
            
            loader.load(model.path, 
                (gltf) => {
                    const obj = gltf.scene;
                    
                    // 優化材質設定
                    obj.traverse(child => {
                        if (child.isMesh) {
                            child.castShadow = false;
                            child.receiveShadow = false;
                            if (child.material) {
                                child.material.roughness = 0.9;
                                child.material.metalness = 0.1;
                                if (child.material.map) {
                                    child.material.map.anisotropy = 1;
                                }
                            }
                        }
                    });
                    
                    // 計算包圍球和中心點
                    const boundingSphere = computeBoundingSphere(obj);
                    obj.userData.center = boundingSphere.center.clone();
                    obj.userData.boundingSphere = boundingSphere;
                    obj.userData.loaded = true;
                    obj.userData.name = model.name;
                    
                    masterGroup.add(obj);
                    loadedModels.set(model.name, obj);  // 記錄到 Map
                    successCount++;
                    
                    // 更新UI
                    memCountSpan.textContent = loadedModels.size;
                    statusSpan.innerHTML = `📦 並行載入中 (${activeLoads} 線程) | ${successCount}/${models.length} (${Math.round((successCount/models.length)*100)}%)`;
                    
                    if (successCount === 1 || successCount % 50 === 0) {
                        updateCameraFocus();
                    }
                    
                    activeLoads--;
                    loadNextBatch();
                },
                undefined, // 進度回調省略
                (error) => {
                    console.warn(`⚠️ 載入失敗 [${model.name}]:`, error);
                    failedCount++;
                    activeLoads--;
                    loadNextBatch();
                }
            );
            
            // 繼續觸發更多載入
            if (activeLoads < CONCURRENT_LOAD_LIMIT && loadQueue.length > 0) {
                setTimeout(() => loadNextBatch(), 0);
            }
        }
        
        function finishLoading() {
            isLoading = false;
            statusSpan.innerHTML = `✅ 載入完成 | 成功: ${successCount} | 失敗: ${failedCount}`;
            
            // 載入完成後立即執行一次距離卸載，清理遠景
            setTimeout(() => {
                updateDistanceUnloading();
                dracoLoader.dispose();
                debugSpan.innerHTML = `✨ 載入完成 | 記憶體中保留 ${loadedModels.size} 個模型`;
            }, 500);
        }
        
        // ========== 相機自動對焦 ==========
        function updateCameraFocus() {
            if (masterGroup.children.length === 0) return;
            
            const box = new THREE.Box3().setFromObject(masterGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            if (gridHelper) {
                gridHelper.position.set(center.x, box.min.y - 10, center.z);
            }
            
            const maxDimension = Math.max(size.x, size.z, 500);
            const fovRad = camera.fov * Math.PI / 180;
            let optimalDistance = maxDimension / (2 * Math.tan(fovRad / 2)) * 1.2;
            optimalDistance = Math.min(Math.max(optimalDistance, 800), 8000);
            
            if (successCount <= 10 || successCount === models.length) {
                camera.position.set(center.x + optimalDistance * 0.6, center.y + optimalDistance * 0.4, center.z + optimalDistance * 0.6);
                controls.target.copy(center);
                controls.update();
            }
            
            positionSpan.innerHTML = `📍 範圍: X:${center.x.toFixed(0)} Z:${center.z.toFixed(0)} | 範圍:${Math.round(maxDimension)}m`;
        }
        
        // ========== FPS 計算 ==========
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            const delta = now - lastTime;
            if (delta >= 1000) {
                fps = Math.round((frameCount * 1000) / delta);
                fpsSpan.textContent = fps;
                frameCount = 0;
                lastTime = now;
            }
        }
        
        // ========== 動畫循環 ==========
        let frameIndex = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            updateFPS();
            
            // 定期更新視錐體裁減
            if (frameIndex % FRUSTUM_CULLING_INTERVAL === 0 && !isLoading) {
                updateFrustumCulling();
            }
            
            // 定期檢查距離卸載 (獨立於視錐)
            if (frameIndex % STREAMING_CHECK_INTERVAL === 0 && !isLoading) {
                updateDistanceUnloading();
            }
            
            renderer.render(scene, camera);
            frameIndex++;
        }
        
        // ========== 手動GC按鈕 ==========
        document.getElementById('manual-gc-btn').addEventListener('click', () => {
            performManualGC();
        });
        
        // ========== 窗口大小適配 ==========
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ========== 啟動引擎 ==========
        function start() {
            statusSpan.innerHTML = `🚀 啟動並行引擎 (並行數: ${CONCURRENT_LOAD_LIMIT})...`;
            camera.position.set(3000, 2000, 4000);
            controls.target.set(0, 0, 0);
            controls.update();
            
            // 開始並行載入
            for (let i = 0; i < CONCURRENT_LOAD_LIMIT; i++) {
                loadNextBatch();
            }
            
            animate();
        }
        
        start();
        
        // 定期自動清理遠景 (每30秒)
        setInterval(() => {
            if (!isLoading) {
                updateDistanceUnloading();
            }
        }, 30000);
        
        console.log('✅ HK Digital Twin 優化版已啟動 (距離卸載模式)');
    </script>
</body>
</html>
